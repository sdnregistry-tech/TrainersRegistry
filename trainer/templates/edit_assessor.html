{% extends "home.html" %}
{% block content %}
<div class="container mt-4">
    <h3>Edit Assessor: {{ assessor.first_name }} {{ assessor.last_name }}</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-2">
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ assessor.first_name }}" class="form-control" required>
        </div>
        <div class="mb-2">
            <label>Middle Name</label>
            <input type="text" name="middle_name" value="{{ assessor.middle_name }}" class="form-control">
        </div>
        <div class="mb-2">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ assessor.last_name }}" class="form-control" required>
        </div>
        <div class="mb-2">
            <label>Gender</label>
            <select name="gender" class="form-select" required>
                <option value="">-- Select Gender --</option>
                <option value="Male" {% if assessor.gender == "Male" %}selected{% endif %}>Male</option>
                <option value="Female" {% if assessor.gender == "Female" %}selected{% endif %}>Female</option>
            </select>
        </div>
        <div class="mb-2">
            <label>Address</label>
            <input type="text" name="address" value="{{ assessor.address }}" class="form-control">
        </div>
        <div class="mb-2">
            <label>Birthdate</label>
            <input type="date" name="birthdate" value="{{ assessor.birthdate }}" class="form-control">
        </div>
        <div class="mb-2">
            <label>Qualification</label>
            <input type="text" name="qualification" value="{{ assessor.qualification }}" class="form-control">
        </div>
        <div class="mb-2">
            <label>Email</label>
            <input type="email" name="email" value="{{ assessor.email }}" class="form-control" required>
        </div>
        <div class="mb-2">
            <label>Contact Number</label>
            <input type="text" name="contact_number" value="{{ assessor.contact_number }}" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Update Assessor</button>
        <a href="{% url 'assessor_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
